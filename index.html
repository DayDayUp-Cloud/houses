<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>江头锦苑价值评估入口</title>
    <style>
        /* 消除所有边距，让沙盒完全贴合窗口 */
        body, html { 
            margin: 0; padding: 0; height: 100%; overflow: hidden; background-color: #f8fafc; 
        }
        
        /* 顶层沙盒，一开始就是直接可见的 */
        #app-frame {
            width: 100%; height: 100%; border: none;
            display: block; position: relative; z-index: 2;
        }
        
        /* 提示语放在底层 (z-index: 1) */
        #loading-box {
            position: absolute; top: 40%; left: 0; width: 100%;
            transform: translateY(-50%); text-align: center; color: #64748b;
            z-index: 1; font-family: sans-serif;
        }
    </style>
</head>
<body>
    <div id="loading-box">
        <p>正在为您加载最优测算模型...</p>
        <p style="font-size: 13px; color: #94a3b8; margin-top: -10px;">（模型数据量较大，首次渲染请耐心等待约 3-8 秒）</p>
    </div>
    
    <iframe id="app-frame" src=""></iframe>

    <script>
        // 1. 读取浏览器记忆
        var lastPage = sessionStorage.getItem('myCurrentPage');
        var targetPage = '';

        // 2. 路由逻辑反转：第一次访问或上次是A，则指向最好看的B！
        if (!lastPage || lastPage === 'A') {
            targetPage = 'page_b.html';
            sessionStorage.setItem('myCurrentPage', 'B');
        } else {
            targetPage = 'page_a.html';
            sessionStorage.setItem('myCurrentPage', 'A');
        }

        var iframe = document.getElementById('app-frame');
        
        // 3. 击穿缓存，开始加载文件
        var timestamp = new Date().getTime();
        iframe.src = './' + targetPage + '?v=' + timestamp;

        // 4. 【核心黑魔法：暴力保底机制】
        // 3秒钟后强制隐藏背后的提示字，并给沙盒铺上白底
        setTimeout(function() {
            var loader = document.getElementById('loading-box');
            if(loader) loader.style.display = 'none';
            iframe.style.backgroundColor = '#ffffff'; 
        }, 3000);

        // 如果页面加载得快，立刻隐藏提示字
        iframe.onload = function() {
            var loader = document.getElementById('loading-box');
            if(loader) loader.style.display = 'none';
            iframe.style.backgroundColor = '#ffffff';
        };
    </script>
</body>
</html>
