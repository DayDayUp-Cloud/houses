<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>江头锦苑房产价值测算系统</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        /* 让画中画铺满整个屏幕，没有任何边框和滚动条 */
        body, html { 
            margin: 0; 
            padding: 0; 
            height: 100%; 
            overflow: hidden; 
        }
        iframe { 
            width: 100%; 
            height: 100%; 
            border: none; 
            display: block;
        }
    </style>
</head>
<body>
    <!-- 这是一个画中画（Iframe），我们要往里面塞 A 或者 B -->
    <iframe id="main-frame" src=""></iframe>

    <script>
        // 利用浏览器的“会话记忆(sessionStorage)”来记录你刚才是A还是B
        var lastPage = sessionStorage.getItem('myCurrentPage');
        var iframe = document.getElementById('main-frame');

        // 如果是第一次打开，或者上一次是 B
        if (!lastPage || lastPage === 'B') {
            // 这次就展示 A，并把记忆改成 A
            sessionStorage.setItem('myCurrentPage', 'A');
            iframe.src = "./page_a.html";
        } else {
            // 如果记忆里上一次是 A，刷新时就展示 B，并把记忆改成 B
            sessionStorage.setItem('myCurrentPage', 'B');
            iframe.src = "./page_b.html";
        }
    </script>
</body>
</html>
