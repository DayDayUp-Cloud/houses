<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>江头锦苑价值评估入口</title>
    <style>
        /* 让底层页面和边框消失，伪装成原生页面 */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden; /* 防止出现双重滚动条 */
            background-color: #f8fafc;
        }
        #app-frame {
            width: 100%;
            height: 100%;
            border: none;
            display: none; /* 加载完再显示，防止闪烁 */
        }
        .loading-text {
            text-align: center;
            color: #64748b;
            margin-top: 50vh;
            transform: translateY(-50%);
            font-family: sans-serif;
        }
    </style>
</head>
<body>
    <!-- 过渡动画 -->
    <div id="loading" class="loading-text">正在为您加载最优测算模型...</div>
    
    <!-- 隔离舱（沙盒） -->
    <iframe id="app-frame" src=""></iframe>

    <script>
        // 1. 读取浏览器记忆
        var lastPage = sessionStorage.getItem('myCurrentPage');
        var targetPage = '';

        // 2. 决定路由
        if (!lastPage || lastPage === 'B') {
            targetPage = 'page_a.html';
            sessionStorage.setItem('myCurrentPage', 'A');
        } else {
            targetPage = 'page_b.html';
            sessionStorage.setItem('myCurrentPage', 'B');
        }

        // 3. 组装强行击穿缓存的 URL
        var timestamp = new Date().getTime();
        var fetchUrl = './' + targetPage + '?v=' + timestamp;

        // 4. 将沙盒的地址指向大文件
        var iframe = document.getElementById('app-frame');
        var loading = document.getElementById('loading');

        // 当大文件在沙盒里加载完毕时，隐藏提示语，展示画面
        iframe.onload = function() {
            loading.style.display = 'none';
            iframe.style.display = 'block';
        };

        // 触发加载
        iframe.src = fetchUrl;
    </script>
</body>
</html>
