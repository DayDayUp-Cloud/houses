<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>江头锦苑价值评估入口</title>
</head>
<body>
    <p style="text-align: center; color: #64748b; margin-top: 50px;">正在为您加载最优测算模型...</p>

    <script>
        // 1. 读取浏览器记忆
        var lastPage = sessionStorage.getItem('myCurrentPage');
        var targetPage = '';

        // 2. 判断这次该显示 A 还是 B
        if (!lastPage || lastPage === 'B') {
            targetPage = 'page_a.html';
            sessionStorage.setItem('myCurrentPage', 'A');
        } else {
            targetPage = 'page_b.html';
            sessionStorage.setItem('myCurrentPage', 'B');
        }

        // 3. 【核心黑魔法】去后台拉取代码，并“原地重写”整个网页！
        fetch('./' + targetPage)
            .then(function(response) {
                return response.text();
            })
            .then(function(html) {
                // 如果 fetch 成功，但返回的是 404 网页（GitHub的默认404）
                if (html.includes("404") || html.includes("Not Found")) {
                    throw new Error("文件未找到");
                }
                document.open();
                document.write(html);
                document.close();
            })
            .catch(function(err) {
                console.error('加载失败:', err);
                // 发生错误时，给用户一个体面的降级显示
                document.body.innerHTML = `
                    <div style="text-align: center; margin-top: 100px; color: #ef4444;">
                        <h3 style="font-size: 24px; margin-bottom: 10px;">系统加载异常</h3>
                        <p>无法获取测算模型 (目标文件: ${targetPage})<br>请检查该文件是否已成功上传至同级目录。</p>
                    </div>
                `;
            });
    </script>
</body>
</html>
